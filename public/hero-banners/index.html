<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenny Tang — Hero Responsive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #1a1a1a;
    --accent: #c5a47e;
    --text-heading: #ffffff;
    --text-body: #a0a0a0;
  }

  body {
    background: var(--bg-primary);
    color: var(--text-heading);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 8%;
    max-width: 50%;
  }

  /* On mobile portrait, content goes BELOW portrait */
  @media (max-aspect-ratio: 1/1) {
    .hero-content {
      max-width: 100%;
      align-items: flex-end;
      padding-bottom: 12%;
    }
  }

  .hero-text h1 {
    font-size: clamp(2rem, 5vw, 4.5rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .hero-text h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }

  .hero-text p {
    color: var(--text-body);
    font-size: clamp(0.9rem, 1.2vw, 1.1rem);
    line-height: 1.6;
    max-width: 480px;
  }

  .hero-text .kicker {
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    font-family: 'SF Mono', Monaco, monospace;
  }
</style>
</head>
<body>

<section class="hero">

  <picture>
    <!-- Mobile portrait (phones in portrait orientation) -->
    <source
      media="(max-aspect-ratio: 3/4)"
      srcset="banners/hero_mobile_portrait.webp"
      type="image/webp">
    <source
      media="(max-aspect-ratio: 3/4)"
      srcset="banners/hero_mobile_portrait.png">

    <!-- Ultrawide monitors -->
    <source
      media="(min-aspect-ratio: 21/10)"
      srcset="banners/hero_ultrawide.webp"
      type="image/webp">
    <source
      media="(min-aspect-ratio: 21/10)"
      srcset="banners/hero_ultrawide.png">

    <!-- 4K monitors -->
    <source
      media="(min-width: 3000px)"
      srcset="banners/hero_desktop_4k.webp"
      type="image/webp">
    <source
      media="(min-width: 3000px)"
      srcset="banners/hero_desktop_4k.png">

    <!-- QHD / 2K -->
    <source
      media="(min-width: 2200px)"
      srcset="banners/hero_desktop_qhd.webp"
      type="image/webp">
    <source
      media="(min-width: 2200px)"
      srcset="banners/hero_desktop_qhd.png">

    <!-- Mac 13" Retina (aspect ~3:2) -->
    <source
      media="(min-aspect-ratio: 14/10) and (max-aspect-ratio: 17/10)"
      srcset="banners/hero_macbook_13.webp"
      type="image/webp">
    <source
      media="(min-aspect-ratio: 14/10) and (max-aspect-ratio: 17/10)"
      srcset="banners/hero_macbook_13.png">

    <!-- Tablet (4:3 ish) -->
    <source
      media="(max-aspect-ratio: 14/10)"
      srcset="banners/hero_tablet.webp"
      type="image/webp">
    <source
      media="(max-aspect-ratio: 14/10)"
      srcset="banners/hero_tablet.png">

    <!-- Default: Full HD landscape -->
    <source srcset="banners/hero_desktop_fhd.webp" type="image/webp">
    <img class="hero-bg"
         src="banners/hero_desktop_fhd.png"
         alt="Jenny Tang">
  </picture>

  <div class="hero-content">
    <div class="hero-text">
      <div class="kicker">Portfolio · 2026</div>
      <h1>Jenny<br><span class="accent">Tang.</span></h1>
      <p>Media Operations Analyst working at the intersection of marketing analytics,
      programmatic optimization, and AI workflow automation.</p>
    </div>
  </div>

</section>

</body>
</html>
