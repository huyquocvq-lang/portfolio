<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project banner</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Native 560×510 - scale set via JS to fill iframe width exactly. */
  .banner-fit {
    width: 560px;
    height: 510px;
    flex-shrink: 0;
    transform-origin: center center;
    transform: scale(var(--scale, 1));
  }
</style>
<script>
  function setScale() {
    var s = window.innerWidth / 560;
    document.documentElement.style.setProperty('--scale', s);
  }
  setScale();
  window.addEventListener('resize', setScale);
</script>
</head>
<body>
<div class="banner-fit">

<style>
@keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: .8; } }
@keyframes scanline { from { top: 0; } to { top: 100%; } }
@keyframes flowRight { from { transform: translateX(-100%); } to { transform: translateX(400%); } }
@keyframes dotDrift { 0% { opacity:0; transform:translateY(0) } 20% { opacity:.6 } 80% { opacity:.4 } 100% { opacity:0; transform:translateY(-60px) } }
.bar-planned { transform-origin: left; animation: barGrow .8s cubic-bezier(.22,1,.36,1) forwards; }
.bar-opt { transform-origin: left; animation: barGrow .9s cubic-bezier(.22,1,.36,1) .3s forwards; opacity: 0; animation-fill-mode: forwards; }
.kpi-val { animation: fadeUp .6s ease both; }
.k1 { animation-delay: .2s } .k2 { animation-delay: .35s } .k3 { animation-delay: .5s } .k4 { animation-delay: .65s }
</style>

<div style="width: 560px; height: 510px; background: #0D1117; border-radius: 12px; overflow: hidden; position: relative; font-family: 'Anthropic Sans', -apple-system, sans-serif;">

  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;">
    <div style="position:absolute;top:0;left:50%;width:300px;height:300px;margin-left:-150px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.06),transparent 70%);"></div>
    <div style="position:absolute;bottom:60px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.05),transparent 70%);"></div>
  </div>

  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;" id="particles"></div>

  <div style="position:absolute;top:0;left:0;right:0;height:1px;overflow:hidden;pointer-events:none;">
    <div style="position:absolute;width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(45,212,191,.5),transparent);animation:flowRight 4s linear infinite;"></div>
  </div>

  <div style="padding: 32px 32px 0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <div style="width:7px;height:7px;border-radius:50%;background:#2DD4BF;animation:pulse 2s ease-in-out infinite;"></div>
      <span style="font-size:11px;color:#8B5CF6;letter-spacing:2.5px;font-weight:500;">MEDIA YIELD OPTIMIZATION</span>
    </div>
    <div style="font-size:22px;font-weight:500;color:#E2E8F0;line-height:1.3;margin-bottom:4px;font-family:Georgia,serif;">Placement allocation dashboard</div>
    <div style="font-size:12px;color:#64748B;">AI-powered CPC budget reallocation across 684 publisher placements</div>
  </div>

  <div style="padding:20px 32px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
    <div class="kpi-val k1" style="background:rgba(255,255,255,.04);border-radius:8px;padding:12px 14px;border-left:2px solid #2DD4BF;border-radius:0;">
      <div style="font-size:11px;color:#64748B;letter-spacing:1px;margin-bottom:4px;">CPC BUDGET</div>
      <div style="font-size:20px;font-weight:500;color:#E2E8F0;font-family:Georgia,serif;" id="v-budget">$2.31M</div>
    </div>
    <div class="kpi-val k2" style="background:rgba(255,255,255,.04);border-radius:8px;padding:12px 14px;border-left:2px solid #8B5CF6;border-radius:0;">
      <div style="font-size:11px;color:#64748B;letter-spacing:1px;margin-bottom:4px;">AVG GPM</div>
      <div style="font-size:20px;font-weight:500;color:#E2E8F0;font-family:Georgia,serif;" id="v-gpm">57.9%</div>
    </div>
    <div class="kpi-val k3" style="background:rgba(255,255,255,.04);border-radius:8px;padding:12px 14px;border-left:2px solid #2DD4BF;border-radius:0;">
      <div style="font-size:11px;color:#64748B;letter-spacing:1px;margin-bottom:4px;">PROJ. REVENUE</div>
      <div style="font-size:20px;font-weight:500;color:#E2E8F0;font-family:Georgia,serif;">$669K</div>
    </div>
    <div class="kpi-val k4" style="background:rgba(255,255,255,.04);border-radius:8px;padding:12px 14px;border-left:2px solid #F59E0B;border-radius:0;">
      <div style="font-size:11px;color:#64748B;letter-spacing:1px;margin-bottom:4px;">SAVINGS</div>
      <div style="font-size:20px;font-weight:500;color:#2DD4BF;font-family:Georgia,serif;">$25K</div>
    </div>
  </div>

  <div style="padding:20px 32px 0;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
      <div style="font-size:13px;color:#94A3B8;font-weight:500;">Publisher allocation: planned vs. optimized</div>
      <div style="display:flex;gap:14px;font-size:11px;color:#64748B;">
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#A78BFA;"></span>Planned</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#2DD4BF;"></span>Optimized</span>
      </div>
    </div>
    <div id="chart-area" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

  <div style="position:absolute;bottom:0;left:0;right:0;padding:18px 32px;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,#8B5CF6,#2DD4BF);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;">Y</div>
      <span style="font-size:11px;color:#475569;">Yield optimizer</span>
    </div>
    <div style="font-size:11px;color:#334155;letter-spacing:1px;">220 / 684 ELIGIBLE <span style="color:#2DD4BF;margin-left:2px;">32%</span></div>
  </div>
</div>

<script>
const pubs = [
  { name: 'Network Alpha', planned: 108, optimized: 130, gpm: 62 },
  { name: 'Publisher Omega', planned: 68, optimized: 85, gpm: 58 },
  { name: 'DSP Platform Y', planned: 42, optimized: 55, gpm: 55 },
  { name: 'Premium Pub Q', planned: 38, optimized: 48, gpm: 54 },
  { name: 'DSP Platform Z', planned: 25, optimized: 30, gpm: 57 },
  { name: 'Ad Network Delta', planned: 18, optimized: 22, gpm: 60 },
  { name: 'Search Engine G', planned: 14, optimized: 19, gpm: 60 },
  { name: 'Finance Wire M', planned: 8, optimized: 0, gpm: 30 },
];

const maxVal = 140;
const chart = document.getElementById('chart-area');

pubs.forEach((p, i) => {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:8px;';

  const label = document.createElement('div');
  label.style.cssText = 'width:90px;font-size:11px;color:#64748B;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  label.textContent = p.name;

  const barWrap = document.createElement('div');
  barWrap.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:2px;';

  const b1 = document.createElement('div');
  b1.style.cssText = `height:10px;border-radius:2px;background:#A78BFA;width:${(p.planned/maxVal)*100}%;transform:scaleX(0);transform-origin:left;`;
  b1.className = 'bar-planned';
  b1.style.animationDelay = `${i * 0.08}s`;

  const b2 = document.createElement('div');
  const optW = (p.optimized/maxVal)*100;
  b2.style.cssText = `height:10px;border-radius:2px;background:#2DD4BF;width:${optW}%;opacity:0;transform:scaleX(0);transform-origin:left;`;
  b2.className = 'bar-opt';
  b2.style.animationDelay = `${0.3 + i * 0.08}s`;

  if (p.optimized === 0) {
    b2.style.width = '2px';
    b2.style.background = '#EF4444';
    b2.style.opacity = '0.5';
  }

  barWrap.appendChild(b1);
  barWrap.appendChild(b2);

  const val = document.createElement('div');
  val.style.cssText = 'width:42px;font-size:11px;color:#94A3B8;text-align:right;flex-shrink:0;font-family:"SF Mono","Fira Code",monospace;';
  val.textContent = p.optimized > 0 ? `$${p.optimized}K` : '$0';

  row.appendChild(label);
  row.appendChild(barWrap);
  row.appendChild(val);
  chart.appendChild(row);
});

const particles = document.getElementById('particles');
function spawnDot() {
  const dot = document.createElement('div');
  const x = 90 + Math.random() * 380;
  const startY = 160 + Math.random() * 200;
  const size = 2 + Math.random() * 3;
  const isGreen = Math.random() > 0.4;
  dot.style.cssText = `position:absolute;left:${x}px;top:${startY}px;width:${size}px;height:${size}px;border-radius:50%;background:${isGreen ? '#2DD4BF' : '#A78BFA'};animation:dotDrift ${2+Math.random()*2}s ease-out forwards;`;
  particles.appendChild(dot);
  setTimeout(() => dot.remove(), 4000);
}
setInterval(spawnDot, 600);

function animateCount(el, target, suffix, dur) {
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const v = (ease * target);
    if (suffix === '%') el.textContent = v.toFixed(1) + '%';
    else if (target >= 1) el.textContent = '$' + v.toFixed(2) + 'M';
    else el.textContent = '$' + Math.round(v) + 'K';
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
setTimeout(() => animateCount(document.getElementById('v-budget'), 2.31, 'M', 1200), 400);
setTimeout(() => animateCount(document.getElementById('v-gpm'), 57.9, '%', 1000), 600);
</script>
</div>
</body>
</html>
